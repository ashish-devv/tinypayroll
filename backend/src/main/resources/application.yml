spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      # PRD §2: ddl-auto=update for MVP — switch to Flyway once a second dev or real prod data exists.
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tinypayroll}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${PORT:8080}

app:
  name: TinyPayroll
  jwt:
    secret: ${JWT_SECRET:}
    issuer: tinypayroll
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 30
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006}
  rate-limit:
    capacity: 10
    refill-tokens: 10
    refill-period-seconds: 60
  encryption:
    key: ${BANK_ENCRYPTION_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.tinypayroll: DEBUG
